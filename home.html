<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
</head>
<style>
    *{ /* Seletor universal para aplicar estilos a todos os elementos */
        margin: 0;
        padding: 0;
        box-sizing: border-box; /* Define o modelo de caixa para incluir bordas e preenchimento no tamanho total do elemento */
    }

    body{
        width: 100vw; /* Define a largura do corpo para ocupar toda a largura da janela de visualização */
        height: 100vh; /* Define a altura do corpo para ocupar toda a altura da janela de visualização */ 
        background: black url(imagens/tela-home.jpg) no-repeat top center; /* Define a imagem de fundo, sem repetição, posicionada no topo e centralizada */
        background-size: cover; /* Faz com que a imagem de fundo cubra toda a área do corpo, mantendo sua proporção */
    }
</style>
<body>
    
</body>
</html>
